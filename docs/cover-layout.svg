<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" width="940" height="470" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <radialGradient id="atmo" cx="0.6" cy="0.42" r="0.95">
      <stop offset="0" stop-color="#4A3A1C"/><stop offset="0.5" stop-color="#171E14"/><stop offset="1" stop-color="#08200F"/>
    </radialGradient>
    <radialGradient id="cvig" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
    <radialGradient id="flood" cx="0.4" cy="-0.05" r="0.85">
      <stop offset="0" stop-color="#EAF7EC" stop-opacity="0.12"/><stop offset="1" stop-color="#EAF7EC" stop-opacity="0"/>

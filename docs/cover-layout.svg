  </defs>

  <!-- pitch frame -->
  <g>
    <rect x="0" y="0" width="118" height="470" fill="#10633A"/><rect x="118" y="0" width="118" height="470" fill="#0D5433"/><rect x="236" y="0" width="118" height="470" fill="#10633A"/><rect x="354" y="0" width="118" height="470" fill="#0D5433"/><rect x="472" y="0" width="118" height="470" fill="#10633A"/><rect x="590" y="0" width="118" height="470" fill="#0D5433"/><rect x="708" y="0" width="118" height="470" fill="#10633A"/><rect x="826" y="0" width="118" height="470" fill="#0D5433"/>
  </g>
  <rect width="940" height="470" fill="url(#flood)"/>
  <rect width="940" height="470" fill="url(#pvig)"/>

  <!-- title -->
  <use href="#ball" x="34" y="36" width="28" height="28"/>
  <text x="72" y="56" font-size="22" font-weight="800" letter-spacing="0.3" fill="#F2F7F3">Cover layout</text>
  <text x="900" y="52" text-anchor="end" font-size="12" font-weight="700" letter-spacing="1.5" fill="#F2C14E" font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace">16:9 · 1280×720 · image-only</text>
  <line x1="72" y1="70" x2="210" y2="70" stroke="#F2C14E" stroke-width="2"/>

  <!-- ===== cover artboard (its own cinematic look) ===== -->
  <polygon points="50,100 594,100 610,116 610,415 50,415" fill="#08200F"/>
  <g clip-path="url(#board)">
    <rect x="50" y="100" width="560" height="315" fill="url(#atmo)"/>
    <!-- real photo (right), left edge feathered in -->
    <g mask="url(#featherMask)">
      <rect x="390" y="100" width="220" height="315" fill="#141B26"/>
      <circle cx="516" cy="234" r="48" fill="url(#person)"/>
      <path d="M436,415 C444,338 482,290 516,290 C550,290 588,338 596,415 Z" fill="url(#person)"/>
    </g>
    <rect x="50" y="100" width="560" height="315" fill="url(#cvig)"/>
    <!-- player-card cut-out (left), tilted, gold glow -->
    <g transform="rotate(-6,176,258)" filter="url(#cardglow)">
      <polygon points="116,172 226,172 236,182 236,344 116,344" fill="#0F1A16" stroke="#F2C14E" stroke-width="2.4"/>
      <polygon points="128,186 150,186 150,196 128,196" fill="#F2C14E" opacity="0.9"/>
      <line x1="128" y1="202" x2="150" y2="202" stroke="#F2C14E" stroke-width="1.2" opacity="0.6"/>
      <circle cx="176" cy="250" r="24" fill="#254231" fill-opacity="0.55" stroke="#8FB7A0" stroke-width="1.3"/>
      <path d="M140,338 C146,300 162,284 176,284 C190,284 206,300 212,338 Z" fill="#254231" fill-opacity="0.55" stroke="#8FB7A0" stroke-width="1.3"/>
      <line x1="128" y1="330" x2="224" y2="330" stroke="#F2C14E" stroke-width="1.3" opacity="0.6"/>
    </g>
  </g>
  <polygon points="50,100 594,100 610,116 610,415 50,415" fill="none" stroke="#2A6A47" stroke-width="1.5"/>

  <!-- callouts -->
  <g stroke="#F2C14E" stroke-width="1.3" fill="none" opacity="0.85">
    <path d="M236,178 L236,120 L620,120"/>
    <path d="M560,236 L620,236"/>
  </g>
  <g fill="#F2C14E"><rect x="233" y="175" width="6" height="6"/><rect x="557" y="233" width="6" height="6"/></g>

  <rect x="628" y="112" width="7" height="7" fill="#F2C14E"/>
  <text x="646" y="120" font-size="15" font-weight="700" fill="#F2F7F3">Player card cut-out</text>
  <text x="646" y="140" font-size="12" fill="#A9C6B5">left · tilted −6° · gold outer glow</text>

  <rect x="628" y="228" width="7" height="7" fill="#F2C14E"/>
  <text x="646" y="236" font-size="15" font-weight="700" fill="#F2F7F3">Real photo</text>
  <text x="646" y="256" font-size="12" fill="#A9C6B5">right · left edge feathered in</text>

  <line x1="50" y1="440" x2="610" y2="440" stroke="#1F5B3C" stroke-width="1"/>
  <text x="50" y="460" font-size="12.5" fill="#A9C6B5">Image-only — warm atmosphere, gold vignette, <tspan fill="#F2F7F3" font-weight="700">no text baked in</tspan>.</text>
</svg>
